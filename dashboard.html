<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="favicon-32.png" sizes="32x32">
<meta name="theme-color" content="#FFC629">
<title>Dashboard: Stumblebee</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="course.css">
<style>
  .dash-wrap { padding: 40px 0 80px; }
  .dash-hero { background: var(--ink); color: var(--white); border-radius: var(--radius-lg); padding: 40px 44px; margin-bottom: 24px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 20px; }
  .dash-hero h1 { color: var(--white); font-size: clamp(1.5rem, 3vw, 2.1rem); }
  .dash-ring-wrap { display: flex; align-items: center; gap: 18px; }
  .dash-ring { flex-shrink: 0; }
  .dash-ring-label .big { font-family: "Fredoka", sans-serif; font-size: 2.2rem; }
  .dash-ring-label .small { color: #C9C4B6; font-size: 0.85rem; }

  .honeypot-wrap { display: flex; align-items: center; gap: 20px; }
  .honeypot-svg { flex-shrink: 0; overflow: visible; }
  .honey-fill { transition: y 0.8s cubic-bezier(.34,1.56,.64,1), height 0.8s cubic-bezier(.34,1.56,.64,1); }
  .honey-drop { animation: honeyDrip 2.2s ease-in infinite; }
  .honey-drop:nth-child(2) { animation-delay: 0.7s; }
  .honey-drop:nth-child(3) { animation-delay: 1.4s; }
  @keyframes honeyDrip {
    0%   { transform: translateY(-18px); opacity: 0; }
    12%  { opacity: 1; }
    78%  { opacity: 1; }
    100% { transform: translateY(22px); opacity: 0; }
  }
  .dash-section-title { font-family:"Fredoka",sans-serif; font-weight:600; font-size:1.1rem; margin: 28px 0 14px; }
  .chapter-progress-list { display: flex; flex-direction: column; gap: 10px; }
  .chapter-progress-row { background: var(--white); border-radius: 14px; padding: 16px 20px; display: flex; align-items: center; gap: 16px; }
  .chapter-progress-row .cp-num { width: 30px; height: 30px; border-radius: 999px; background: var(--yellow-soft); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.82rem; flex-shrink: 0; }
  .chapter-progress-row .cp-title { flex: 1; font-weight: 600; font-size: 0.94rem; }
  .chapter-progress-row .cp-track { width: 140px; height: 8px; background: var(--yellow-soft); border-radius: 999px; overflow: hidden; flex-shrink: 0; }
  .chapter-progress-row .cp-fill { height: 100%; background: var(--yellow-deep); }
  .chapter-progress-row .cp-fraction { font-size: 0.8rem; color: var(--ink-faint); width: 46px; text-align: right; flex-shrink: 0; }
  .empty-dash { background: var(--white); border-radius: var(--radius-lg); padding: 60px 40px; text-align: center; }
  @media (max-width: 560px) {
    .chapter-progress-row { flex-wrap: wrap; }
    .chapter-progress-row .cp-track { width: 100%; order: 3; }
    .dash-hero { padding: 32px 24px; }
  }
</style>
<script src="auth.js"></script>
<script src="auth-gate.js"></script>
</head>
<body class="course-body" data-page="dashboard">

<div id="siteNavRoot"></div>

<main class="wrap dash-wrap" id="dashRoot"></main>

<footer class="site-footer">
  <div class="wrap">
    <div class="footer-inner">
      <a href="index" class="brand" style="font-size:1.15rem;">
        <svg class="bee-icon" style="width:22px;height:22px;" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="16" cy="18" rx="9.5" ry="7.5" fill="#18140C"/>
          <path d="M7 16 Q16 12.5 25 16" stroke="#FFC629" stroke-width="3" stroke-linecap="round"/>
          <path d="M7.8 20.5 Q16 24 24.2 20.5" stroke="#FFC629" stroke-width="3" stroke-linecap="round"/>
        </svg>
        stumblebee
      </a>
      <div class="footer-links">
        <a href="resources">Resources</a>
        <a href="settings">Settings</a>
      </div>
      <p class="footer-copy">© 2026 Stumblebee.</p>
    </div>
  </div>
</footer>

<script src="exam-lock.js"></script>
<script src="gre-math-data.js"></script>
<script src="gmat-quant-data.js"></script>
<script src="gmat-di-data.js"></script>
<script src="gmat-verbal-data.js"></script>
<script src="vocab-data.js"></script>
<script src="vocab-srs.js"></script>
<script src="daily-goal.js"></script>
<script src="nav.js"></script>
<script>
  function getProgressSet(exam, sub) {
    try { return new Set(JSON.parse(localStorage.getItem(`stumblebee_progress_${exam}_${sub}`) || "[]")); }
    catch (e) { return new Set(); }
  }

  function honeyPotSVG(pct) {
    // Window (the fill gauge) spans y=85..145 inside the pot belly.
    const winTop = 85, winBottom = 145, winHeight = winBottom - winTop;
    const honeyH = Math.max(4, (pct / 100) * winHeight);
    const honeyY = winBottom - honeyH;
    return `
      <svg class="honeypot-svg" width="150" height="190" viewBox="0 0 160 190">
        <defs>
          <clipPath id="honeyWindowClip">
            <rect x="35" y="${winTop}" width="90" height="${winHeight}" rx="10"/>
          </clipPath>
        </defs>

        <!-- drips -->
        <g>
          <ellipse class="honey-drop" cx="68" cy="14" rx="3.4" ry="5" fill="#F5B700"/>
          <ellipse class="honey-drop" cx="80" cy="10" rx="3.8" ry="5.6" fill="#FFC629"/>
          <ellipse class="honey-drop" cx="93" cy="14" rx="3.2" ry="4.6" fill="#F5B700"/>
        </g>

        <!-- pot body -->
        <path d="M50,35 C50,35 40,55 30,70 C20,90 20,120 25,140 C30,158 55,167 80,167 C105,167 130,158 135,140 C140,120 140,90 130,70 C120,55 110,35 110,35 Z"
              fill="#D98D46" stroke="#8A4A22" stroke-width="3"/>

        <!-- window (fill gauge background) -->
        <rect x="35" y="${winTop}" width="90" height="${winHeight}" rx="10" fill="#FFF8E7" stroke="#8A4A22" stroke-width="2"/>
        <rect class="honey-fill" x="35" y="${honeyY}" width="90" height="${honeyH}" clip-path="url(#honeyWindowClip)" fill="#F5B700"/>

        <!-- rim -->
        <path d="M50,35 C50,35 60,28 80,28 C100,28 110,35 110,35 C110,35 100,42 80,42 C60,42 50,35 50,35 Z" fill="#8A4A22"/>
        <ellipse cx="80" cy="34" rx="24" ry="7" fill="#5C2E14"/>
      </svg>`;
  }

  function render() {
    const exam = ExamLock.get();
    const root = document.getElementById("dashRoot");

    if (!exam) {
      root.innerHTML = `
        <div class="empty-dash">
          <span class="eyebrow">No exam selected</span>
          <h1 style="margin-top:16px;">Pick an exam to start tracking progress.</h1>
          <p class="muted" style="margin:14px 0 26px;">Your dashboard will fill up as you complete lessons.</p>
          <a href="course" class="btn btn-black">Choose GRE or GMAT →</a>
        </div>`;
      return;
    }

    const subject = SUBJECTS[exam];
    const liveSections = subject.sections.filter(s => s.status === "live");

    let totalDone = 0, totalLessons = 0;
    const sectionBlocks = liveSections.map(sec => {
      const chapters = getChaptersFor(exam, sec.key);
      const progress = getProgressSet(exam, sec.key);
      let secTotal = 0;
      const rows = chapters.map(ch => {
        const done = ch.lessons.filter(ls => progress.has(ls.id)).length;
        secTotal += ch.lessons.length;
        totalLessons += ch.lessons.length;
        totalDone += done;
        const pct = Math.round((done / ch.lessons.length) * 100);
        return `
          <div class="chapter-progress-row">
            <div class="cp-num">${ch.number}</div>
            <div class="cp-title">${ch.title}</div>
            <div class="cp-track"><div class="cp-fill" style="width:${pct}%;"></div></div>
            <div class="cp-fraction">${done}/${ch.lessons.length}</div>
          </div>`;
      }).join("");
      return `<div class="dash-section-title">${sec.icon} ${sec.label}</div><div class="chapter-progress-list">${rows}</div>`;
    }).join("");

    let vocabBlock = "";
    if (exam === "GRE" && typeof VOCAB_WORDS !== "undefined") {
      const vocabMastered = VocabSRS.masteredWords().length;
      const vocabTotal = VOCAB_WORDS.length;
      totalDone += vocabMastered;
      totalLessons += vocabTotal;
      const vocabPct = Math.round((vocabMastered / vocabTotal) * 100);
      vocabBlock = `
        <div class="dash-section-title">📚 Vocabulary</div>
        <a href="vocab" class="chapter-progress-row" style="text-decoration:none; color:inherit; display:flex;">
          <div class="cp-num">📖</div>
          <div class="cp-title">${vocabMastered} of ${vocabTotal} words mastered</div>
          <div class="cp-track"><div class="cp-fill" style="width:${vocabPct}%;"></div></div>
          <div class="cp-fraction">${vocabPct}%</div>
        </a>`;
    }

    const overallPct = totalLessons ? Math.round((totalDone / totalLessons) * 100) : 0;

    let goalBlock = "";
    if (typeof DailyGoal !== "undefined") {
      const plan = DailyGoal.computePlan(exam);
      if (plan) {
        const doneToday = DailyGoal.getTodayCompleted();
        const goalMet = doneToday >= plan.perDay;
        const goalPct = Math.min(100, Math.round((doneToday / plan.perDay) * 100));
        goalBlock = `
          <div class="dash-section-title">🎯 Today's goal</div>
          <div class="chapter-progress-row" style="align-items:center;">
            <div class="cp-num">${goalMet ? "✅" : "📌"}</div>
            <div class="cp-title">${goalMet ? `Done for today, nice work.` : `${doneToday} of ${plan.perDay} today`} &mdash; ${plan.daysLeft} day${plan.daysLeft === 1 ? "" : "s"} left, ${plan.remaining} left overall</div>
            <div class="cp-track"><div class="cp-fill" style="width:${goalPct}%;"></div></div>
            <div class="cp-fraction">${doneToday}/${plan.perDay}</div>
          </div>`;
      }
    }

    root.innerHTML = `
      <div class="dash-hero">
        <div>
          <span class="eyebrow" style="background:var(--yellow);">${exam} progress</span>
          <h1 style="margin-top:14px;">You've completed ${totalDone} of ${totalLessons} lessons and words.</h1>
        </div>
        <div class="honeypot-wrap">
          ${honeyPotSVG(overallPct)}
          <div class="dash-ring-label"><div class="big">${overallPct}%</div><div class="small">honey pot filled</div></div>
        </div>
      </div>
      ${goalBlock}
      ${vocabBlock}
      ${sectionBlocks}
    `;
  }

  render();
</script>
</body>
</html>
